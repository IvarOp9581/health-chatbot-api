services:
  - type: web
    name: health-chatbot-api
    env: python
    runtime: python-3.11.0
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install --only-binary=:all: -r requirements.txt && python database/migrate.py
    startCommand: gunicorn app.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: USE_FIRESTORE
        value: false
      - key: DEBUG
        value: false
      - key: SESSION_EXPIRY_DAYS
        value: 7
      - key: RATE_LIMIT_PER_HOUR
        value: 100
      - key: RATE_LIMIT_PER_MINUTE
        value: 20
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.0
